<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="apple-touch-icon" href="app-icon.png">
    <title>Stock-Master | User</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body>
    <div id="loadingOverlay" class="loader-wrapper" style="display: none;">
        <div class="loader"></div>
        <p id="loaderText">Loading Inventory...</p> 
    </div>

<div id="welcomeModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>Welcome to Stock-Master</h3>
        <p style="font-size: 14px; color: var(--text-sec); margin-bottom: 15px;">
            Behtar experience ke liye apna naam batayein.
        </p>
        <input type="text" id="userNameInput" placeholder="Apna naam likhein..." 
               style="width: 100%; padding: 12px; border: 2px solid var(--border-base); border-radius: 12px; margin-bottom: 20px; font-size: 16px;">
        <button class="btn-primary" onclick="saveUserName()">Continue</button>
    </div>
</div>


    <div class="container">
        <div id="adminView" class="view">
            <div class="top-bar">
                <h2>📦 Stock-Master</h2>
                <div class="top-actions">
                    <button class="btn-icon-top" onclick="toggleSearch()">🔍</button>
                    <button id="bucketTrigger" class="btn-icon-top bucket-nav" onclick="showBucketScreen()">
                        🛒 <span id="bucketBadge">0</span>
                    </button>
                </div>
            </div>

            <div class="header-row">
                <div id="breadcrumb" class="breadcrumb">🏠 Home</div>
            </div>

           <div id="searchWrapper" class="search-box" style="display: none;">
    <div style="position: relative; width: 100%;">
        <input type="text" id="searchInput" placeholder="Search items..." oninput="handleSearch()" 
               style="width: 100%; padding-right: 45px;"> <button id="voiceSearchBtn" onclick="startVoiceSearch()" 
                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); border: none; background: transparent; font-size: 22px; cursor: pointer; padding: 0; line-height: 1;">
            <svg id="micSvgIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-mic" style="color: var(--primary);">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
    <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
    <line x1="12" y1="19" x2="12" y2="23"></line>
    <line x1="8" y1="23" x2="16" y2="23"></line>
</svg>
        </button>
    </div>
</div>


            <div id="displayArea" class="list-container"></div>
        </div>

        <div id="bucketView" class="view" style="display: none;">
            <div class="view-header">
                <h3>🛒 My Selection</h3>
                <button class="btn-close-view" onclick="hideBucketScreen()">✕</button>
            </div>
            <div id="bucketItemsList" class="order-list"></div>
        </div> 
    </div>

    <div id="image-capture-container" style="position: absolute; left: -2000px; visibility: hidden;"></div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <script src="user-script.js" defer></script>
</body>
</html>
