    <title>Stock-Master Ultra</title>
    <link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>
<body>
    
    
<div id="loadingOverlay" class="loader-wrapper" style="display: none;">
    <div class="loader"></div>
    <p id="loaderText">Processing...</p> </div>

    <div class="container">
        
        <div id="settingsView" class="view" style="display: none;">
            
    <div class="view-header">
        <h3>⚙️ Change Admin Password</h3>
        <button class="btn-close-view" onclick="hideSettingsScreen()">✕</button>
    </div>
    <div style="padding: 20px;">
        <label style="font-size: 13px; color: var(--text-sec); font-weight: bold;">Step 1: Old Password</label>
        <input type="password" id="oldPassInput" placeholder="Enter current password..." 
               style="width: 100%; padding: 12px; border: 2px solid var(--border-base); border-radius: 12px; margin-top: 5px; margin-bottom: 15px;">

        <label style="font-size: 13px; color: var(--text-sec); font-weight: bold;">Step 2: New Password (Exactly 10 chars)</label>
        <input type="text" id="adminPassInput" maxlength="10" placeholder="Enter 10-digit new password..." 
               style="width: 100%; padding: 12px; border: 2px solid var(--border-base); border-radius: 12px; margin-top: 5px;">
        
        <p style="font-size: 11px; color: var(--danger); mt-10" id="passErrorHint"></p>

        <button class="btn-main-action" onclick="updateAdminPassword()" style="margin-top: 20px;">
            Verify & Update
        </button>
    </div>
    <div style="margin-top: 25px; border-top: 1px solid #eee; pt-15">
    <label style="font-size: 13px; font-weight: bold; color: var(--primary);">📢 Send Global Notification</label>
    <textarea id="globalMsgInput" placeholder="Sabhi users ko kya message bhejna hai?" 
              style="width: 100%; margin-top: 8px; border-radius: 12px; border: 2px solid var(--border-base); padding: 10px;"></textarea>
    <button class="btn-primary" onclick="sendGlobalNotification()" style="margin-top: 10px;">Send To All Users</button>
</div>
</div>

        <div id="adminView" class="view">
            <div class="top-bar">
                <h2>📦 Stock-Master</h2>
                <div class="top-actions">
                    <button class="btn-icon-top" onclick="toggleSearch()">🔍</button>
                    <button id="bucketTrigger" class="btn-icon-top bucket-nav" onclick="showBucketScreen()">
                        🛒 <span id="bucketBadge">0</span>
                    </button>
                    <div class="menu-container">
                        <button class="btn-icon-top" onclick="toggleMenu()">⋮</button>
                        <div id="dropMenu" class="dropdown-menu" style="display: none;">
                            <button onclick="showAddModal()">➕ New Item</button>
                            <button onclick="showHistoryScreen()">📜 History</button>
                               <button onclick="showSettingsScreen()">⚙️ Settings</button> 
                        </div>
                    </div>
                </div>
            </div>

            <div class="header-row">
                <div id="breadcrumb" class="breadcrumb"></div>
            </div>

            <div id="searchWrapper" class="search-box" style="display: none;">
                <input type="text" id="searchInput" placeholder="Search to add to bucket..." oninput="handleSearch()">
            </div>

<div id="displayArea" class="list-container">

</div>

            <div id="selectionBar" class="selection-floating-bar" style="display: none;">
                <div class="selection-info">
                    <span id="selectCount">0</span>
                    <small>Selected</small>
                </div>
                <div class="bar-btns">
                    <button id="editBtn" class="action-item" onclick="startEditFromBar()">
                        <span>✏️</span><label>Edit</label>
                    </button>
                    <button class="action-item" onclick="deleteMultiple()">
                        <span>🗑️</span><label>Delete</label>
                    </button>
                    <button id="bulkBucketBtn" class="action-item" onclick="bulkAddToBucket()">
                        <span>📥</span><label>Bucket</label>
                    </button>
                    <button class="btn-close-bar" onclick="clearSelection()">✕</button>
                </div>
            </div>
        </div>

      <div id="addModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 id="modalTitle">Add New Inventory</h3>
                <small>To add sub-category, use '>' symbol (e.g. Chips > Lays).</small>
                <textarea id="masterInput" placeholder="Lays, Bingo, Crax"></textarea>
                <div class="modal-btns">
                    <button id="mainBtn" class="btn-primary" onclick="handleMasterAdd()">Save Item</button>
                    <button class="btn-secondary" onclick="hideAddModal()">Cancel</button>
                </div>
            </div>
        </div>

        <div id="bucketView" class="view" style="display: none;">
            <div class="view-header">
                <h3>🛒 My Bucket</h3>
                <button class="btn-close-view" onclick="hideBucketScreen()">✕</button>
            </div>
            <div id="bucketItemsList" class="order-list"></div>
        </div> 

        <div id="historyView" class="view" style="display: none;">
            <div class="view-header">
                <h3>📜 Order History</h3>
                <button onclick="clearHistory()" class="clear-btn">
    🗑 Clear History
</button>
                <button class="btn-close-view" onclick="hideHistoryScreen()">✕</button>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>


    <script src="script.js" defer></script>
<div id="image-capture-container" style="position: absolute; top: 0; left: 0; width: 400px; z-index: -1; visibility: hidden;"></div>
</body>
</html>
